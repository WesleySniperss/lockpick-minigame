name: Release Module

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update version in module.json
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          TAG=${GITHUB_REF_NAME}
          jq --arg v "$VERSION" \
             --arg dl "https://github.com/${{ github.repository }}/releases/download/${TAG}/module.zip" \
             '.version = $v | .download = $dl' \
             module.json > module.tmp.json
          mv module.tmp.json module.json

      - name: Create module.zip
        run: |
          zip -r module.zip \
            module.json \
            scripts/ \
            styles/ \
            --exclude "*.DS_Store"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Lockpick Minigame v${{ steps.version.outputs.VERSION }}

            **Встановлення через Foundry:**
            1. `Add-on Modules` → `Install Module`
            2. Вставити URL маніфесту:
               ```
               https://raw.githubusercontent.com/${{ github.repository }}/main/module.json
               ```
          files: |
            module.zip
            module.json
